{{ $videos := (.Page.Resources.ByType "video") }}
{{ if .Get "match"}}
        {{ $matchpath := add (.Get "match") "*"}}
	{{ $videos = (.Page.Resources.Match $matchpath) }}
{{ end }}

<div class="vidgallery">
    {{ range $videos}}
        <video controls loop muted preload="auto">
            <source src="{{ . }}" type="video/webm">
        </video>
    {{ end }}
</div>
